name: Tag Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable version to release (X.Y.Z, no leading v)
        required: true
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: tag-release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main with tags
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Tag main and start the release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION. Expected X.Y.Z (stable, no leading v)." >&2
            exit 1
          fi

          release_tag="v$VERSION"

          if git rev-parse --verify "refs/tags/$release_tag" >/dev/null 2>&1; then
            echo "Release tag already exists: $release_tag" >&2
            exit 1
          fi

          # The release workflow requires the tagged commit's package metadata to
          # match the tag, so insist the version bump has already landed on main.
          pkg_version="$(node -p "require('./package.json').version")"
          if [[ "$pkg_version" != "$VERSION" ]]; then
            echo "package.json on main is $pkg_version but the requested release is $VERSION." >&2
            echo "Land the version bump on main before tagging the release." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$release_tag" -m "$release_tag"
          git push origin "$release_tag"

          # Tags pushed with GITHUB_TOKEN do not trigger on-push workflows, so
          # dispatch the release workflow explicitly (same as the nightly beta).
          gh workflow run release.yml \
            --ref main \
            --raw-field "release_tag=$release_tag"
          echo "Tagged main as $release_tag and dispatched the release workflow."
