name: Release (Windows)

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: windows-latest
    outputs:
      should_release: ${{ steps.release-check.outputs.should_release }}
      previous_version: ${{ steps.release-check.outputs.previous_version }}
      release_version: ${{ steps.release-check.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify release version bump
        id: release-check
        shell: pwsh
        run: |
          $baseRef = $env:PUSH_BEFORE
          if ([string]::IsNullOrWhiteSpace($baseRef) -or $baseRef -match '^0+$') {
            $baseRef = (git rev-parse HEAD^).Trim()
          }

          if ([string]::IsNullOrWhiteSpace($baseRef)) {
            throw 'Unable to determine the previous commit for version comparison.'
          }

          $changedFiles = git diff --name-only $baseRef HEAD
          if (-not $changedFiles) {
            throw "No changed files detected between $baseRef and HEAD."
          }

          $packageJsonChanged = $changedFiles -contains 'package.json'
          $packageLockChanged = $changedFiles -contains 'package-lock.json'

          $env:BASE_REF = $baseRef
          $env:PACKAGE_JSON_CHANGED = if ($packageJsonChanged) { 'true' } else { 'false' }
          $env:PACKAGE_LOCK_CHANGED = if ($packageLockChanged) { 'true' } else { 'false' }

          @'
          const fs = require('fs');
          const { execFileSync } = require('child_process');

          function fail(message) {
            console.error(message);
            process.exit(1);
          }

          function parseVersion(version, label) {
            const match = /^(\d+)\.(\d+)\.(\d+)(?:[-+].*)?$/.exec(version || '');
            if (!match) fail(`Invalid ${label} version: ${version || '(empty)'}`);
            return match.slice(1, 4).map(Number);
          }

          function compareVersions(left, right) {
            const a = parseVersion(left, 'current');
            const b = parseVersion(right, 'previous');
            for (let index = 0; index < 3; index += 1) {
              if (a[index] > b[index]) return 1;
              if (a[index] < b[index]) return -1;
            }
            return 0;
          }

          function readJsonAtRef(ref, file) {
            return JSON.parse(execFileSync('git', ['show', `${ref}:${file}`], { encoding: 'utf8' }));
          }

          const baseRef = process.env.BASE_REF;
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          const previousPkg = readJsonAtRef(baseRef, 'package.json');
          const previousLock = readJsonAtRef(baseRef, 'package-lock.json');

          const currentPackageVersion = pkg.version;
          const currentLockVersion = lock.version;
          const currentRootLockVersion = lock.packages?.['']?.version;

          if (!currentPackageVersion || !currentLockVersion || !currentRootLockVersion) {
            fail('package.json and package-lock.json must define matching non-empty versions.');
          }

          if (currentPackageVersion !== currentLockVersion || currentPackageVersion !== currentRootLockVersion) {
            fail(`Version mismatch detected. package.json=${currentPackageVersion}, package-lock.json=${currentLockVersion}, package-lock root=${currentRootLockVersion}`);
          }

          const previousPackageVersion = previousPkg.version;
          const previousLockVersion = previousLock.version;
          const previousRootLockVersion = previousLock.packages?.['']?.version;

          if (!previousPackageVersion || !previousLockVersion || !previousRootLockVersion) {
            fail('Previous commit is missing version metadata required for comparison.');
          }

          if (previousPackageVersion !== previousLockVersion || previousPackageVersion !== previousRootLockVersion) {
            fail(`Previous commit has inconsistent versions. package.json=${previousPackageVersion}, package-lock.json=${previousLockVersion}, package-lock root=${previousRootLockVersion}`);
          }

          const packageVersionComparison = compareVersions(currentPackageVersion, previousPackageVersion);
          const lockVersionComparison = compareVersions(currentLockVersion, previousLockVersion);
          const rootLockVersionComparison = compareVersions(currentRootLockVersion, previousRootLockVersion);
          const releaseTriggered = packageVersionComparison > 0 || lockVersionComparison > 0 || rootLockVersionComparison > 0;

          if (!releaseTriggered) {
            console.log(`No release version bump detected (${previousPackageVersion} -> ${currentPackageVersion}).`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'should_release=false\n');
            process.exit(0);
          }

          if (process.env.PACKAGE_JSON_CHANGED !== 'true') {
            fail('Release version bump detected but package.json was not changed.');
          }

          if (process.env.PACKAGE_LOCK_CHANGED !== 'true') {
            fail('Release version bump detected but package-lock.json was not changed.');
          }

          if (packageVersionComparison <= 0) {
            fail(`Release version must be greater than the previous commit. Current=${currentPackageVersion}, Previous=${previousPackageVersion}`);
          }

          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `should_release=true\nprevious_version=${previousPackageVersion}\nrelease_version=${currentPackageVersion}\n`
          );
          console.log(`Validated version bump ${previousPackageVersion} -> ${currentPackageVersion}`);
          '@ | node -
        env:
          PUSH_BEFORE: ${{ github.event.before }}

      - name: Install dependencies
        if: ${{ steps.release-check.outputs.should_release == 'true' }}
        run: npm ci

      - name: Run linter
        if: ${{ steps.release-check.outputs.should_release == 'true' }}
        run: npm run lint

      - name: Run tests
        if: ${{ steps.release-check.outputs.should_release == 'true' }}
        run: npm test

      - name: Skip release
        if: ${{ steps.release-check.outputs.should_release != 'true' }}
        run: echo "No version bump detected; skipping release build."

  build:
    needs: validate
    if: ${{ needs.validate.outputs.should_release == 'true' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts (NSIS)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run dist -- --win nsis --publish always

      - name: Upload artifacts (fallback)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  build-mac:
    needs: validate
    if: ${{ needs.validate.outputs.should_release == 'true' }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS artifacts (unsigned)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npm run dist:mac -- --publish always

      - name: Upload artifacts (fallback)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: dist-mac
          path: dist/*
