name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing vX.Y.Z or vX.Y.Z-beta.N tag to publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-publish
  cancel-in-progress: false

jobs:
  validate:
    outputs:
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      release_version: ${{ steps.release_meta.outputs.release_version }}
      release_prerelease: ${{ steps.release_meta.outputs.release_prerelease }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - id: release_meta
        name: Resolve release version from tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          $releaseTag = $env:RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            throw 'Release tag is missing.'
          }

          if ($releaseTag -notmatch '^v\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$') {
            throw "Invalid release tag: $releaseTag. Expected vX.Y.Z or vX.Y.Z-suffix."
          }

          $releaseVersion = $releaseTag.Substring(1)
          $releasePrerelease = if ($releaseVersion -match '-') { 'true' } else { 'false' }
          "release_tag=$releaseTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_version=$releaseVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_prerelease=$releasePrerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Resolved release version $releaseVersion from tag $releaseTag"
          Write-Host "GitHub prerelease: $releasePrerelease"

      - name: Verify tag points to main HEAD
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          main_head="$(git rev-parse origin/main)"
          tag_sha="$(git rev-parse HEAD)"

          if [[ "$tag_sha" != "$main_head" ]]; then
            echo "Release tag must point to the current origin/main HEAD." >&2
            echo "Tag commit:  $tag_sha" >&2
            echo "origin/main: $main_head" >&2
            exit 1
          fi

      - name: Align package versions to release tag
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.release_version }}
        run: |
          npm version $env:RELEASE_VERSION --no-git-tag-version --allow-same-version

      - name: Verify aligned package versions
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.release_version }}
        run: |
          @'
          const fs = require('fs');

          function fail(message) {
            console.error(message);
            process.exit(1);
          }

          const releaseVersion = process.env.RELEASE_VERSION;
          const releaseTag = process.env.RELEASE_TAG;
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));

          const versions = [
            ['package.json', pkg.version],
            ['package-lock.json', lock.version],
            ['package-lock.json packages[""]', lock.packages?.['']?.version],
          ];

          for (const [label, version] of versions) {
            if (!version) {
              fail(`${label} is missing a release version.`);
            }
          }

          const mismatches = versions.filter(([, version]) => version !== releaseVersion);
          if (mismatches.length > 0) {
            const summary = versions
              .map(([label, version]) => `${label}=${version}`)
              .join(', ');
            fail(`Release tag ${releaseTag} must match package metadata. Expected ${releaseVersion}; found ${summary}`);
          }

          console.log(`Validated release tag ${releaseTag} against package metadata.`);
          '@ | node -

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

  build:
    needs: validate
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.release_tag }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Align package versions to release tag
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.release_version }}
        run: |
          npm version $env:RELEASE_VERSION --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build Windows artifacts (NSIS)
        run: |
          npm run dist -- --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/*.yml
            !dist/builder-debug.yml
          if-no-files-found: error

  build-mac:
    needs: validate
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.release_tag }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Align package versions to release tag
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.release_version }}
        run: |
          npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build macOS artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npm run dist:mac -- --publish never

      - name: Verify macOS app bundle signature
        shell: bash
        run: |
          set -euo pipefail

          found_app=0
          while IFS= read -r -d '' app; do
            found_app=1
            codesign --verify --deep --strict --verbose=4 "$app"

            executable="$app/Contents/MacOS/HA Desktop Widget"
            architectures="$(lipo -archs "$executable")"
            if [[ " $architectures " != *" x86_64 "* || " $architectures " != *" arm64 "* ]]; then
              echo "Expected a universal macOS executable; found architectures: $architectures" >&2
              exit 1
            fi
          done < <(find dist -type d -name 'HA Desktop Widget.app' -print0)

          if [[ "$found_app" -eq 0 ]]; then
            echo "No packaged macOS .app bundle found under dist." >&2
            exit 1
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-macos
          path: |
            dist/*.dmg
            dist/*-mac.zip
            dist/*.blockmap
            dist/*.yml
            !dist/builder-debug.yml
          if-no-files-found: error

  build-linux:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.release_tag }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools fakeroot dpkg libcrypt1
          # X11 dev headers required to compile the native uiohook-napi module
          # (electron-builder install-app-deps rebuilds it from source on Linux).
          # binding.gyp links -lX11 -lXrandr -lXtst -lXt.
          sudo apt-get install -y libx11-dev libxrandr-dev libxtst-dev libxt-dev

      - name: Align package versions to release tag
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.release_version }}
        run: |
          npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build Linux artifacts (AppImage and deb)
        run: |
          npm run dist:linux -- --publish never

      - name: Verify Linux update artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          # electron-builder 26 no longer generates AppImage .blockmap files
          # (AppImage differential updates were dropped upstream); just verify the
          # AppImage and its update manifest are present.
          appimages=(dist/*.AppImage)
          if [[ "${#appimages[@]}" -ne 1 ]]; then
            echo "Expected exactly one Linux AppImage artifact, found ${#appimages[@]}." >&2
            printf '%s\n' "${appimages[@]}" >&2
            exit 1
          fi

          updates=(dist/*-linux.yml)
          if [[ "${#updates[@]}" -ne 1 ]]; then
            echo "Expected exactly one Linux update manifest (*-linux.yml), found ${#updates[@]}." >&2
            printf '%s\n' "${updates[@]}" >&2
            exit 1
          fi

          echo "Verified Linux AppImage (${appimages[0]}) and update manifest (${updates[0]})."

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/*.yml
            !dist/builder-debug.yml
          if-no-files-found: error

  publish-release:
    needs: [validate, build, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.validate.outputs.release_version }}
          RELEASE_PRERELEASE: ${{ needs.validate.outputs.release_prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          debug_artifact="$(find release-artifacts -type f -name 'builder-debug.yml' -print -quit)"
          if [[ -n "$debug_artifact" ]]; then
            echo "Internal electron-builder metadata must not be published: $debug_artifact" >&2
            exit 1
          fi

          artifacts=()
          while IFS= read -r -d '' artifact; do
            artifacts+=("$artifact")
          done < <(find release-artifacts -type f -print0)

          if [[ "${#artifacts[@]}" -eq 0 ]]; then
            echo "No release artifacts were downloaded." >&2
            exit 1
          fi

          for artifact in "${artifacts[@]}"; do
            dir="$(dirname "$artifact")"
            base="$(basename "$artifact")"
            normalized="${base/#HA Desktop Widget-/HA-Desktop-Widget-}"
            normalized="${normalized/#HA.Desktop.Widget-/HA-Desktop-Widget-}"
            if [[ "$normalized" != "$base" ]]; then
              mv "$artifact" "$dir/$normalized"
            fi
          done

          artifacts=()
          while IFS= read -r -d '' artifact; do
            artifacts+=("$artifact")
          done < <(find release-artifacts -type f -print0)

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${artifacts[@]}" --clobber
            if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
              gh release edit "$RELEASE_TAG" --prerelease
            else
              gh release edit "$RELEASE_TAG" --latest
            fi
          else
            release_flags=(--latest)
            if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
              release_flags=(--prerelease)
            fi

            published_releases="$(
              gh release list \
                --exclude-drafts \
                --limit 1000 \
                --json tagName,isPrerelease,publishedAt
            )"

            notes_start_tag=''
            if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
              release_base_version="${RELEASE_VERSION%%-*}"
              notes_start_tag="$(
                jq -r \
                  --arg current "$RELEASE_TAG" \
                  --arg prefix "v${release_base_version}-" \
                  '[.[] | select(
                    .isPrerelease == true and
                    .tagName != $current and
                    (.tagName | startswith($prefix))
                  )][0].tagName // empty' \
                  <<<"$published_releases"
              )"
            fi

            if [[ -z "$notes_start_tag" ]]; then
              notes_start_tag="$(
                jq -r \
                  --arg current "$RELEASE_TAG" \
                  '[.[] | select(
                    .isPrerelease == false and
                    .tagName != $current
                  )][0].tagName // empty' \
                  <<<"$published_releases"
              )"
            fi

            notes_flags=(--generate-notes)
            if [[ -n "$notes_start_tag" ]]; then
              notes_flags+=(--notes-start-tag "$notes_start_tag")
              echo "Generating release notes from $notes_start_tag to $RELEASE_TAG."
            else
              echo "No previous published release was found; GitHub will choose the release-notes baseline."
            fi

            gh release create "$RELEASE_TAG" "${artifacts[@]}" \
              --verify-tag \
              --title "$RELEASE_VERSION" \
              "${notes_flags[@]}" \
              "${release_flags[@]}"
          fi

  sync-version:
    needs: [validate, publish-release]
    if: needs.validate.outputs.release_prerelease != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.release_tag }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Align package versions to release tag
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.release_version }}
        run: |
          npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version

      - name: Commit version bump back to main
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.validate.outputs.release_version }}
        run: |
          set -euo pipefail

          if git diff --quiet -- package.json package-lock.json; then
            echo "package.json and package-lock.json already match $RELEASE_TAG on the tagged commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "release-version-sync-$RELEASE_VERSION"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $RELEASE_VERSION"
          git push origin HEAD:main
