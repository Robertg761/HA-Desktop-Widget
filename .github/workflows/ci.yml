name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npx eslint . --max-warnings=0

      - name: Run tests
        run: npm test

  lint-and-test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install native build dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxt-dev libxinerama-dev libxkbcommon-dev libxkbcommon-x11-dev libxkbfile-dev libpng-dev

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npx eslint . --max-warnings=0

      - name: Run tests
        run: npm test
